{% extends 'base.html' %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold mb-8">{{ page.title }}</h1>
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-8 prose dark:prose-invert max-w-none">
        {{ page.content|linebreaksbr }}
    </div>
</div>
{% endblock %}
