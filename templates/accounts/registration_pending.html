{% extends 'base.html' %}
{% block title %}Verify Email{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-20 text-center">
    <h1 class="text-2xl font-bold mb-4">Check Your Email</h1>
    <p class="text-gray-600">We've sent a verification link to your email. Please click it to activate your account.</p>
    <a href="{% url 'accounts:login' %}" class="inline-block mt-6 text-brand-600 hover:underline">Back to Login</a>
</div>
{% endblock %}
