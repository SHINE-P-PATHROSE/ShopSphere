{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-center mb-6">Sign In</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="w-full bg-brand-600 text-white py-3 rounded-lg font-semibold hover:bg-brand-700">Login</button>
        </form>
        <p class="text-center mt-4 text-sm">
            <a href="{% url 'accounts:forgot_password' %}" class="text-brand-600 hover:underline">Forgot password?</a>
        </p>
        <p class="text-center mt-2 text-sm">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-brand-600 hover:underline">Register</a></p>
    </div>
</div>
<style>input, select { width: 100%; padding: 0.5rem 1rem; border: 1px solid #d1d5db; border-radius: 0.5rem; }</style>
{% endblock %}
